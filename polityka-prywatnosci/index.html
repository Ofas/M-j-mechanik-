<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=https://moj-startup.eu/polityka.html">
  <link rel="canonical" href="https://moj-startup.eu/polityka.html">
  <title>Przekierowanie do polityki prywatnosci</title>
</head>
<body>
  <p>Przejdz do <a href="https://moj-startup.eu/polityka.html">polityki prywatnosci</a>.</p>

<section class="bg-brandRed py-12 border-t border-red-400 text-center">
    <div class="container mx-auto px-6 max-w-4xl">
        <h2 class="text-2xl md:text-3xl font-extrabold text-white mb-4">Masz Check Engine? Sprawdź błąd w telefonie.</h2>
        <p class="text-white/90 text-lg mb-6">Pobierz Mój Mechanik z Google Play.</p>
        <a href="https://play.google.com/store/apps/details?id=com.lukasz.mojmechanik&hl=pl&gl=PL&utm_source=website&utm_medium=page&utm_campaign=polityka_prywatnosci" class="inline-flex bg-white text-brandRed hover:bg-gray-100 px-8 py-4 rounded-xl font-bold text-lg transition-all items-center justify-center gap-3"><i class="fa-brands fa-google-play text-xl"></i>Pobierz Mój Mechanik z Google Play</a>
    </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('a[href*="play.google.com/store/apps/details"]').forEach(function (link) {
    link.addEventListener('click', function () {
      if (typeof gtag === 'function') {
        var url = new URL(link.href);
        gtag('event', 'click_google_play', {
          link_url: link.href,
          link_id: link.id || 'no_id',
          page_path: window.location.pathname,
          utm_source: url.searchParams.get('utm_source') || 'none',
          utm_medium: url.searchParams.get('utm_medium') || 'none',
          utm_campaign: url.searchParams.get('utm_campaign') || 'none'
        });
      }
    });
  });
});
</script>
</body>
</html>
